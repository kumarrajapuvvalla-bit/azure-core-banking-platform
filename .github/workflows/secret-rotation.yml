name: ISO 27001 Secret Rotation (90-Day)

on:
  schedule:
    # Run on the 1st of every month at 02:00 UTC (within maintenance window)
    - cron: '0 2 1 * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: Dry run (log actions without executing)
        required: true
        type: boolean
        default: true
      environment:
        description: Target environment
        required: true
        type: choice
        options: [staging, prod]
        default: staging

permissions:
  id-token: write
  contents: read

jobs:
  rotate-secrets:
    name: Rotate Key Vault Secrets
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    environment: ${{ github.event.inputs.environment || 'prod' }}

    env:
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      KEY_VAULT_NAME: kv-pwc-banking-${{ github.event.inputs.environment || 'prod' }}-uks

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        uses: azure/aks-set-context@v4
        with:
          resource-group: rg-pwc-banking-aks-${{ github.event.inputs.environment || 'prod' }}-uks
          cluster-name: aks-pwc-banking-${{ github.event.inputs.environment || 'prod' }}-uks

      - name: Run secret rotation
        run: |
          chmod +x scripts/rotate-secrets.sh
          ./scripts/rotate-secrets.sh
        env:
          KEY_VAULT_NAME: ${{ env.KEY_VAULT_NAME }}
          DRY_RUN: ${{ env.DRY_RUN }}

      - name: Notify rotation result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}';
            const env = '${{ github.event.inputs.environment || "prod" }}';
            const dryRun = '${{ env.DRY_RUN }}';
            
            console.log('Secret rotation ' + status + ' for ' + env + ' (dry_run=' + dryRun + ')');
            
            if (status !== 'success') {
              core.setFailed('Secret rotation failed for ' + env);
            }
