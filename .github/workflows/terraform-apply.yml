name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [dev, staging, prod]
      action:
        description: Terraform action
        required: true
        type: choice
        options: [plan, apply]
        default: plan

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action || 'plan' }} - ${{ github.event.inputs.environment || 'staging' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    environment: ${{ github.event.inputs.environment || 'staging' }}

    env:
      TF_ENV: ${{ github.event.inputs.environment || 'staging' }}
      TF_ACTION: ${{ github.event.inputs.action || 'plan' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.5.7'
          terraform_wrapper: true

      - name: Terraform Init
        id: init
        run: |
          cd terraform
          terraform init \
            -backend-config="resource_group_name=rg-pwc-banking-tfstate-${{ env.TF_ENV }}" \
            -backend-config="storage_account_name=sapwcbankingtfstate${{ env.TF_ENV }}" \
            -reconfigure

      - name: Terraform Validate
        id: validate
        run: |
          cd terraform
          terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: |
          cd terraform
          terraform plan \
            -var="environment=${{ env.TF_ENV }}" \
            -var="alert_email=${{ secrets.ALERT_EMAIL }}" \
            -var="pagerduty_webhook=${{ secrets.PAGERDUTY_WEBHOOK }}" \
            -out=tfplan \
            -detailed-exitcode \
            -no-color 2>&1 | tee plan-output.txt
          
          # Exit code 0 = no changes, 2 = changes present, 1 = error
          PLAN_EXIT=${PIPESTATUS[0]}
          echo "plan_exit_code=$PLAN_EXIT" >> $GITHUB_OUTPUT

      - name: Terraform Apply
        id: apply
        if: env.TF_ACTION == 'apply' && steps.plan.outputs.plan_exit_code == '2'
        run: |
          cd terraform
          terraform apply \
            -auto-approve \
            -no-color \
            tfplan 2>&1 | tee apply-output.txt

      - name: Save Terraform outputs
        if: env.TF_ACTION == 'apply'
        run: |
          cd terraform
          terraform output -json > tf-outputs.json

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: terraform-plan-${{ env.TF_ENV }}-${{ github.run_id }}
          path: |
            terraform/tfplan
            terraform/plan-output.txt
          retention-days: 30
